name: Build, Deploy, Test


permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish Blazor WASM
        run: |
          dotnet restore
          dotnet publish -c Release -o build

      - name: Add .nojekyll
        run: touch build/wwwroot/.nojekyll

      - name: List build output
        run: |
          echo "Listing build/wwwroot"
          ls -R build/wwwroot

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install
          chmod -R +x node_modules/.bin
          npx playwright install --with-deps

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/wwwroot
          force_orphan: true

      - name: Wait for GitHub Pages
        run: |
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://anayabanerjee2208.github.io/voicebotnew-webapp/)
            
            echo "Attempt $i: HTTP $STATUS"

            if [ "$STATUS" = "200" ]; then
              echo "GitHub Pages is live"
              exit 0
            fi

            sleep 10
          done

          echo "GitHub Pages never became available"
          exit 1

      - name: Run Playwright tests against GitHub Pages
        env:
          PLAYWRIGHT_BASE_URL: https://anayabanerjee2208.github.io/voicebotnew-webapp/
        run: |
          echo "Testing against $PLAYWRIGHT_BASE_URL"
          npx playwright test

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results