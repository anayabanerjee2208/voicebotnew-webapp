name: Build, Deploy, Test

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-deploy-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish Blazor WASM
        run: |
          dotnet restore
          dotnet publish -c Release -o build

      - name: List build output
        run: |
          echo "Listing build/wwwroot"
          ls -R build/wwwroot

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install
          chmod -R +x node_modules/.bin
          npx playwright install --with-deps

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/wwwroot
          force_orphan: true

      - name: Run Playwright tests against GitHub Pages
        env:
          PLAYWRIGHT_BASE_URL: https://anayabanerjee2208.github.io/voicebotnew-webapp/
        run: |
          echo "Testing against $PLAYWRIGHT_BASE_URL"
          npx playwright test
